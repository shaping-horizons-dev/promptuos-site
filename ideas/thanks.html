<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptuos — Idea Received!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0fdf4;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 52px 44px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .check {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #059669, #0d9488);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .check svg { width: 32px; height: 32px; }
  h1 {
    font-size: 24px;
    color: #0f766e;
    margin-bottom: 10px;
    font-weight: 700;
  }
  p {
    font-size: 15px;
    color: #64748b;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  a.btn {
    display: inline-block;
    padding: 12px 28px;
    background: linear-gradient(135deg, #059669, #0d9488);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  a.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(5,150,105,0.3);
  }
</style>
</head>
<body>
<div class="card">
  <div class="check">
    <svg fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
  </div>
  <h1>Idea Received!</h1>
  <p>Thank you for sharing your thoughts. Every idea helps us build a better platform for ABA agencies.</p>
  <a href="/ideas/" class="btn">Submit Another Idea</a>
</div>
</body>
</html>
