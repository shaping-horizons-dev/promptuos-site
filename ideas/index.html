<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptuos — Ideas Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0fdf4;
    color: #1e293b;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .page {
    max-width: 960px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #059669;
    letter-spacing: -0.5px;
  }
  .logo span { color: #0d9488; }
  h1 {
    font-size: 22px;
    color: #0f766e;
    margin-top: 4px;
    font-weight: 700;
  }
  .subtitle {
    font-size: 15px;
    color: #64748b;
    margin-top: 6px;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }

  /* Form card */
  .form-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    position: sticky;
    top: 20px;
  }
  .form-card h2 {
    font-size: 17px;
    color: #0f766e;
    margin-bottom: 20px;
    font-weight: 700;
  }
  label {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
  }
  input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #1e293b;
    background: #f9fafb;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: #0d9488;
    box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 100px; border-radius: 0 0 10px 10px; border-top: none; display: none; }
  .editor {
    min-height: 100px;
    max-height: 220px;
    overflow-y: auto;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-top: none;
    border-radius: 0 0 10px 10px;
    font-size: 14px;
    font-family: inherit;
    color: #1e293b;
    background: #f9fafb;
    outline: none;
    line-height: 1.5;
  }
  .editor:focus {
    border-color: #0d9488;
    box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
    background: #fff;
  }
  .editor:empty::before {
    content: "Describe your idea...";
    color: #94a3b8;
    pointer-events: none;
  }
  .editor ul, .editor ol { padding-left: 20px; margin: 4px 0; }
  .editor li { margin-bottom: 2px; }
  .toolbar {
    display: flex;
    gap: 2px;
    background: #f1f5f9;
    border: 1.5px solid #d1d5db;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    padding: 4px 6px;
  }
  .toolbar button {
    background: none;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #475569;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .toolbar button:hover {
    background: #e2e8f0;
    color: #0f766e;
  }
  .toolbar .sep {
    width: 1px;
    background: #d1d5db;
    margin: 2px 4px;
  }
  .field { margin-bottom: 16px; }
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .pills input[type="radio"] { display: none; }
  .pills label {
    display: inline-block;
    padding: 6px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 0;
  }
  .pills input[type="radio"]:checked + label {
    background: #0d9488;
    color: #fff;
    border-color: #0d9488;
  }
  .pills label:hover {
    border-color: #0d9488;
    color: #0d9488;
  }
  button[type="submit"] {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #059669, #0d9488);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 4px;
  }
  button[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(5,150,105,0.3);
  }

  /* Ideas list */
  .ideas-panel h2 {
    font-size: 17px;
    color: #0f766e;
    margin-bottom: 16px;
    font-weight: 700;
  }
  .ideas-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .idea-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    border-left: 4px solid #0d9488;
    transition: box-shadow 0.2s;
  }
  .idea-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .idea-card.priority-critical { border-left-color: #dc2626; }
  .idea-card.priority-important { border-left-color: #f59e0b; }
  .idea-card.priority-nice-to-have { border-left-color: #22c55e; }
  .idea-title {
    font-size: 15px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .idea-body {
    font-size: 13.5px;
    color: #475569;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .idea-body strong { color: #1e293b; }
  .idea-body em { font-style: italic; }
  .idea-body ul, .idea-body ol {
    padding-left: 20px;
    margin: 4px 0;
  }
  .idea-body li { margin-bottom: 2px; }
  .idea-body h3 {
    font-size: 13.5px;
    font-weight: 700;
    color: #1e293b;
    margin: 6px 0 2px;
  }
  .idea-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: #94a3b8;
  }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11.5px;
    font-weight: 600;
  }
  .tag-category {
    background: #e0f2fe;
    color: #0369a1;
  }
  .tag-priority-critical {
    background: #fee2e2;
    color: #dc2626;
  }
  .tag-priority-important {
    background: #fef3c7;
    color: #b45309;
  }
  .tag-priority-nice-to-have {
    background: #dcfce7;
    color: #16a34a;
  }
  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
    font-size: 14px;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #94a3b8;
    font-size: 14px;
    background: #fff;
    border-radius: 12px;
  }
  .count {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 400;
    margin-left: 6px;
  }

  /* Password gate */
  .gate-overlay {
    position: fixed;
    inset: 0;
    background: #f0fdf4;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate-card {
    background: #fff;
    border-radius: 16px;
    padding: 44px 40px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    text-align: center;
  }
  .gate-card .logo { margin-bottom: 6px; }
  .gate-card h2 {
    font-size: 18px;
    color: #0f766e;
    margin-bottom: 6px;
  }
  .gate-card p {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 24px;
  }
  .gate-card input {
    text-align: center;
    font-size: 16px;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .gate-card button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #059669, #0d9488);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .gate-card button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(5,150,105,0.3);
  }
  .gate-error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  @media (max-width: 700px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .form-card {
      position: static;
    }
  }
</style>
</head>
<body>

<!-- Password gate -->
<div class="gate-overlay" id="gate">
  <div class="gate-card">
    <div class="logo">Prompt<span>uos</span></div>
    <h2>Ideas Board</h2>
    <p>Enter the team password to continue</p>
    <form onsubmit="return checkPass()">
      <input type="password" id="gate-pass" placeholder="Password" autocomplete="off" autofocus>
      <button type="submit">Enter</button>
      <div class="gate-error" id="gate-error">Incorrect password. Try again.</div>
    </form>
  </div>
</div>

<div class="page" id="main-content" style="display:none">
  <div class="header">
    <div class="logo">Prompt<span>uos</span></div>
    <h1>Ideas Board</h1>
    <p class="subtitle">Share ideas and see what the team is thinking</p>
  </div>

  <div class="layout">
    <!-- Form -->
    <div class="form-card">
      <h2>New Idea</h2>
      <form action="https://promptuos-ideas.alexgonza.workers.dev" method="POST">
        <input type="text" name="_honey" style="display:none">

        <div class="field">
          <label>Who are you?</label>
        </div>
        <div class="pills">
          <input type="radio" id="name-elaine" name="name" value="Elaine" checked>
          <label for="name-elaine">Elaine</label>
          <input type="radio" id="name-denis" name="name" value="Denis">
          <label for="name-denis">Denis</label>
          <input type="radio" id="name-alex" name="name" value="Alex">
          <label for="name-alex">Alex</label>
        </div>

        <div class="field">
          <label>Category</label>
        </div>
        <div class="pills">
          <input type="radio" id="cat-feature" name="category" value="New Feature" checked>
          <label for="cat-feature">New Feature</label>
          <input type="radio" id="cat-improve" name="category" value="Improvement">
          <label for="cat-improve">Improvement</label>
          <input type="radio" id="cat-integration" name="category" value="Integration">
          <label for="cat-integration">Integration</label>
          <input type="radio" id="cat-billing" name="category" value="Billing & Payroll">
          <label for="cat-billing">Billing & Payroll</label>
          <input type="radio" id="cat-scheduling" name="category" value="Scheduling">
          <label for="cat-scheduling">Scheduling</label>
          <input type="radio" id="cat-other" name="category" value="Other">
          <label for="cat-other">Other</label>
        </div>

        <div class="field">
          <label for="idea">Your Idea</label>
          <div class="toolbar">
            <button type="button" onclick="fmt('bold')" title="Bold"><b>B</b></button>
            <button type="button" onclick="fmt('italic')" title="Italic"><i>I</i></button>
            <div class="sep"></div>
            <button type="button" onclick="fmt('ul')" title="Bullet list">&#8226; List</button>
            <button type="button" onclick="fmt('ol')" title="Numbered list">1. List</button>
            <div class="sep"></div>
            <button type="button" onclick="fmt('h3')" title="Heading">H</button>
          </div>
          <div class="editor" id="editor" contenteditable="true"></div>
          <textarea id="idea" name="idea" required></textarea>
        </div>

        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="Nice to have">Nice to have</option>
            <option value="Important">Important</option>
            <option value="Critical">Critical — I need this</option>
          </select>
        </div>

        <button type="submit">Submit Idea</button>
      </form>
    </div>

    <!-- Ideas list -->
    <div class="ideas-panel">
      <h2>Submitted Ideas <span class="count" id="ideas-count"></span></h2>
      <div class="ideas-list" id="ideas-list">
        <div class="loading">Loading ideas...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = "https://promptuos-ideas.alexgonza.workers.dev";
  const PASS_KEY = "promptuos_ideas_access";
  const PASS_HASH = "a3c2f8e1"; // simple hash of the password

  function simpleHash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return (h >>> 0).toString(16);
  }

  function unlock() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("main-content").style.display = "block";
    loadIdeas();
  }

  // Check if already authenticated
  if (localStorage.getItem(PASS_KEY) === simpleHash("Shaping2026!")) {
    unlock();
  }

  function checkPass() {
    const input = document.getElementById("gate-pass").value;
    if (input === "Shaping2026!") {
      localStorage.setItem(PASS_KEY, simpleHash(input));
      unlock();
    } else {
      document.getElementById("gate-error").style.display = "block";
      document.getElementById("gate-pass").value = "";
      document.getElementById("gate-pass").focus();
    }
    return false;
  }

  // WYSIWYG toolbar — uses execCommand for real formatting
  function fmt(type) {
    const editor = document.getElementById("editor");
    editor.focus();
    switch (type) {
      case "bold": document.execCommand("bold"); break;
      case "italic": document.execCommand("italic"); break;
      case "ul": document.execCommand("insertUnorderedList"); break;
      case "ol": document.execCommand("insertOrderedList"); break;
      case "h3":
        // Toggle heading: if already in a h3, revert to paragraph
        const sel = window.getSelection();
        const block = sel.anchorNode?.parentElement?.closest("h3");
        if (block) {
          document.execCommand("formatBlock", false, "div");
        } else {
          document.execCommand("formatBlock", false, "h3");
        }
        break;
    }
  }

  // Convert editor HTML to markdown for GitHub Issues
  function htmlToMarkdown(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;

    function walk(node) {
      let md = "";
      for (const child of node.childNodes) {
        if (child.nodeType === 3) {
          md += child.textContent;
        } else if (child.nodeType === 1) {
          const tag = child.tagName.toLowerCase();
          const inner = walk(child);
          switch (tag) {
            case "b": case "strong": md += `**${inner}**`; break;
            case "i": case "em": md += `_${inner}_`; break;
            case "h3": md += `### ${inner}\n`; break;
            case "ul": md += inner; break;
            case "ol": md += inner; break;
            case "li":
              const parent = child.parentElement?.tagName.toLowerCase();
              if (parent === "ol") {
                const idx = Array.from(child.parentElement.children).indexOf(child) + 1;
                md += `${idx}. ${inner}\n`;
              } else {
                md += `- ${inner}\n`;
              }
              break;
            case "br": md += "\n"; break;
            case "div": case "p": md += (md && !md.endsWith("\n") ? "\n" : "") + inner; break;
            default: md += inner;
          }
        }
      }
      return md;
    }
    return walk(tmp).trim();
  }

  // Sync editor content to hidden textarea before submit
  document.querySelector(".form-card form").addEventListener("submit", function(e) {
    const editor = document.getElementById("editor");
    const textarea = document.getElementById("idea");
    const md = htmlToMarkdown(editor.innerHTML);
    if (!md.trim()) {
      e.preventDefault();
      editor.focus();
      return;
    }
    textarea.value = md;
  });

  // Render markdown from GitHub Issues to HTML for display
  function renderMarkdown(text) {
    if (!text) return "";
    let html = escapeHtml(text);
    html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
    html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/(?<!\w)_(.+?)_(?!\w)/g, "<em>$1</em>");
    html = html.replace(/((?:^- .+\n?)+)/gm, (match) => {
      const items = match.trim().split("\n").map(l => "<li>" + l.replace(/^- /, "") + "</li>").join("");
      return "<ul>" + items + "</ul>";
    });
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, (match) => {
      const items = match.trim().split("\n").map(l => "<li>" + l.replace(/^\d+\. /, "") + "</li>").join("");
      return "<ol>" + items + "</ol>";
    });
    html = html.replace(/\n/g, "<br>");
    html = html.replace(/<br>(<\/?(?:ul|ol|li|h3)>)/g, "$1");
    html = html.replace(/(<\/?(?:ul|ol|li|h3)>)<br>/g, "$1");
    return html;
  }

  async function loadIdeas() {
    const container = document.getElementById("ideas-list");
    const countEl = document.getElementById("ideas-count");

    try {
      const res = await fetch(WORKER_URL);
      if (!res.ok) throw new Error("Failed to fetch");
      const ideas = await res.json();

      countEl.textContent = `(${ideas.length})`;

      if (ideas.length === 0) {
        container.innerHTML = '<div class="empty">No ideas yet — be the first to submit one!</div>';
        return;
      }

      container.innerHTML = ideas.map(idea => {
        const priorityClass = idea.priority ? `priority-${idea.priority.replace(/\s+/g, "-")}` : "";
        const date = new Date(idea.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" });
        const categoryTag = idea.category ? `<span class="tag tag-category">${idea.category}</span>` : "";
        const priorityTag = idea.priority ? `<span class="tag tag-${priorityClass}">${idea.priority}</span>` : "";

        return `
          <div class="idea-card ${priorityClass}">
            <div class="idea-body">${idea.body ? renderMarkdown(idea.body) : escapeHtml(idea.title)}</div>
            <div class="idea-meta">
              ${categoryTag}
              ${priorityTag}
              <span>${escapeHtml(idea.author)} &middot; ${date}</span>
            </div>
          </div>
        `;
      }).join("");
    } catch (e) {
      container.innerHTML = '<div class="empty">Could not load ideas. Try refreshing.</div>';
    }
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

</script>

</body>
</html>
