<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptuos — Ideas Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0fdf4;
    color: #1e293b;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .page {
    max-width: 960px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #059669;
    letter-spacing: -0.5px;
  }
  .logo span { color: #0d9488; }
  h1 {
    font-size: 22px;
    color: #0f766e;
    margin-top: 4px;
    font-weight: 700;
  }
  .subtitle {
    font-size: 15px;
    color: #64748b;
    margin-top: 6px;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }

  /* Form card */
  .form-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    position: sticky;
    top: 20px;
  }
  .form-card h2 {
    font-size: 17px;
    color: #0f766e;
    margin-bottom: 20px;
    font-weight: 700;
  }
  label {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
  }
  input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #1e293b;
    background: #f9fafb;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: #0d9488;
    box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 100px; }
  .field { margin-bottom: 16px; }
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .pills input[type="radio"] { display: none; }
  .pills label {
    display: inline-block;
    padding: 6px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 0;
  }
  .pills input[type="radio"]:checked + label {
    background: #0d9488;
    color: #fff;
    border-color: #0d9488;
  }
  .pills label:hover {
    border-color: #0d9488;
    color: #0d9488;
  }
  button[type="submit"] {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #059669, #0d9488);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 4px;
  }
  button[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(5,150,105,0.3);
  }

  /* Ideas list */
  .ideas-panel h2 {
    font-size: 17px;
    color: #0f766e;
    margin-bottom: 16px;
    font-weight: 700;
  }
  .ideas-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .idea-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    border-left: 4px solid #0d9488;
    transition: box-shadow 0.2s;
  }
  .idea-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .idea-card.priority-critical { border-left-color: #dc2626; }
  .idea-card.priority-important { border-left-color: #f59e0b; }
  .idea-card.priority-nice-to-have { border-left-color: #22c55e; }
  .idea-title {
    font-size: 15px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .idea-body {
    font-size: 13.5px;
    color: #475569;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .idea-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: #94a3b8;
  }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11.5px;
    font-weight: 600;
  }
  .tag-category {
    background: #e0f2fe;
    color: #0369a1;
  }
  .tag-priority-critical {
    background: #fee2e2;
    color: #dc2626;
  }
  .tag-priority-important {
    background: #fef3c7;
    color: #b45309;
  }
  .tag-priority-nice-to-have {
    background: #dcfce7;
    color: #16a34a;
  }
  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
    font-size: 14px;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #94a3b8;
    font-size: 14px;
    background: #fff;
    border-radius: 12px;
  }
  .count {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 400;
    margin-left: 6px;
  }

  @media (max-width: 700px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .form-card {
      position: static;
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="logo">Prompt<span>uos</span></div>
    <h1>Ideas Board</h1>
    <p class="subtitle">Share ideas and see what the team is thinking</p>
  </div>

  <div class="layout">
    <!-- Form -->
    <div class="form-card">
      <h2>New Idea</h2>
      <form action="https://promptuos-ideas.alexgonza.workers.dev" method="POST">
        <input type="text" name="_honey" style="display:none">

        <div class="field">
          <label>Who are you?</label>
        </div>
        <div class="pills">
          <input type="radio" id="name-elaine" name="name" value="Elaine" checked>
          <label for="name-elaine">Elaine</label>
          <input type="radio" id="name-denis" name="name" value="Denis">
          <label for="name-denis">Denis</label>
          <input type="radio" id="name-alex" name="name" value="Alex">
          <label for="name-alex">Alex</label>
        </div>

        <div class="field">
          <label>Category</label>
        </div>
        <div class="pills">
          <input type="radio" id="cat-feature" name="category" value="New Feature" checked>
          <label for="cat-feature">New Feature</label>
          <input type="radio" id="cat-improve" name="category" value="Improvement">
          <label for="cat-improve">Improvement</label>
          <input type="radio" id="cat-integration" name="category" value="Integration">
          <label for="cat-integration">Integration</label>
          <input type="radio" id="cat-billing" name="category" value="Billing & Payroll">
          <label for="cat-billing">Billing & Payroll</label>
          <input type="radio" id="cat-scheduling" name="category" value="Scheduling">
          <label for="cat-scheduling">Scheduling</label>
          <input type="radio" id="cat-other" name="category" value="Other">
          <label for="cat-other">Other</label>
        </div>

        <div class="field">
          <label for="idea">Your Idea</label>
          <textarea id="idea" name="idea" placeholder="Describe your idea..." required></textarea>
        </div>

        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="Nice to have">Nice to have</option>
            <option value="Important">Important</option>
            <option value="Critical">Critical — I need this</option>
          </select>
        </div>

        <button type="submit">Submit Idea</button>
      </form>
    </div>

    <!-- Ideas list -->
    <div class="ideas-panel">
      <h2>Submitted Ideas <span class="count" id="ideas-count"></span></h2>
      <div class="ideas-list" id="ideas-list">
        <div class="loading">Loading ideas...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = "https://promptuos-ideas.alexgonza.workers.dev";

  async function loadIdeas() {
    const container = document.getElementById("ideas-list");
    const countEl = document.getElementById("ideas-count");

    try {
      const res = await fetch(WORKER_URL);
      if (!res.ok) throw new Error("Failed to fetch");
      const ideas = await res.json();

      countEl.textContent = `(${ideas.length})`;

      if (ideas.length === 0) {
        container.innerHTML = '<div class="empty">No ideas yet — be the first to submit one!</div>';
        return;
      }

      container.innerHTML = ideas.map(idea => {
        const priorityClass = idea.priority ? `priority-${idea.priority.replace(/\s+/g, "-")}` : "";
        const date = new Date(idea.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" });
        const categoryTag = idea.category ? `<span class="tag tag-category">${idea.category}</span>` : "";
        const priorityTag = idea.priority ? `<span class="tag tag-${priorityClass}">${idea.priority}</span>` : "";

        return `
          <div class="idea-card ${priorityClass}">
            <div class="idea-title">${escapeHtml(idea.title)}</div>
            ${idea.body ? `<div class="idea-body">${escapeHtml(idea.body)}</div>` : ""}
            <div class="idea-meta">
              ${categoryTag}
              ${priorityTag}
              <span>${escapeHtml(idea.author)} &middot; ${date}</span>
            </div>
          </div>
        `;
      }).join("");
    } catch (e) {
      container.innerHTML = '<div class="empty">Could not load ideas. Try refreshing.</div>';
    }
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  loadIdeas();
</script>

</body>
</html>
